services:
  backend:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    volumes:
      - ./backend:/var/www/html
    networks:
      - network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - network

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --log_bin_trust_function_creators=1
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # volume anonyme (sans nom) qui empêche le dossier local d'écraser les modules installés dans le container.
      # Sans lui, Docker monterait le node_modules local vide par-dessus celui du container — Vite ne trouverait plus ses dépendances.
      - frontend_node_modules:/app/node_modules
    networks:
      - network
    depends_on:
      - backend

networks:
  network:
    driver: bridge

volumes:
  dbdata:
  frontend_node_modules: